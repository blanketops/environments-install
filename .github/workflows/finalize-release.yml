name: Finalize Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to finalize (e.g. v0.0.9)"
        required: true
permissions:
  contents: write
jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Merge release into main
        run: |
          git checkout main
          git pull origin main
          git merge --no-ff origin/release/${{ github.event.inputs.version }} \
            -m "release: merge release/${{ github.event.inputs.version }} into main"
          git push origin main

      - name: Tag release
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Merge main back into develop
        run: |
          git checkout develop
          git pull origin develop
          git merge --no-ff origin/main \
            -m "chore: sync develop with main after release/${{ github.event.inputs.version }}"
          git push origin develop

      - name: Delete release branch
        run: |
          git push origin --delete release/${{ github.event.inputs.version }}
      - name: Release Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎉 Release Finalized **Version:** \`${{ github.event.inputs.version }}\` 
          ## Completed 
          - Merged \`release/${{ github.event.inputs.version }}\` into \`main\` 
          - Created Git tag \`${{ github.event.inputs.version }}\` 
          - Synced \`main\` back into \`develop\`
          - Deleted release branch 
          ## Branch Flow 
          -  release/${{ github.event.inputs.version }} ↓ main ↓ develop 
          ## Release Tag \`${{ github.event.inputs.version }}\` 
          ## Next Steps
          - Pushing the tag triggers the **Release** workflow which generates the changelog and GitHub Release. 
          EOF
