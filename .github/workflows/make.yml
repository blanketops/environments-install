name: Make
on:
  push:
    branches: [ "develop", "release" ]
  pull_request:
    branches: [ "develop", "release" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          cache: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          wait: 120s

      - name: Clean cache
        run: rm -rf bin/

      - name: Make build
        run: make build
       
      - name: Make Sync RBAC
        run: make sync-rbac

      - name: Make validate
        run: make validate

      - name: Make build-installer
        run: make build-installer

      - name: Upload Operator Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blanketops-environments-install
          path: dist/install.yaml
          retention-days: 14

      # Job summary — rendered on the workflow run page.
      # always() so a red run still reports what it produced and where it died.
      - name: Job summary
        if: always()
        run: |
          {
            echo "## BlanketOps Environments — Make"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Ref | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA::12}\` |"
            echo "| Trigger | ${GITHUB_EVENT_NAME} |"
            echo "| Go | \`$(grep '^go ' go.mod | awk '{print $2}')\` |"
            echo "| kubectl | \`v1.28.0\` |"
            echo "| Job status | **${{ job.status }}** |"
            echo ""
            if [ -f dist/install.yaml ]; then
              echo "### Installer"
              echo ""
              echo "| Artifact | Size | Resources |"
              echo "| --- | --- | --- |"
              echo "| \`blanketops-environments-install\` | $(du -h dist/install.yaml | cut -f1) | $(grep -c '^kind:' dist/install.yaml) |"
              echo ""
              echo "CRDs included:"
              echo ""
              grep -A1 '^kind: CustomResourceDefinition' dist/install.yaml \
                | grep -oP 'name: \K.*' | sort | sed 's/^/- `/' | sed 's/$/`/' || echo "_none detected_"
            else
              echo "### Installer"
              echo ""
              echo "⚠️ \`dist/install.yaml\` was not produced — build or installer step failed before artifact generation."
            fi
          } >> "$GITHUB_STEP_SUMMARY"