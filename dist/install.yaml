apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments
    app.kubernetes.io/part-of: blanketops
    app.kubernetes.io/version: v0.0.1
    control-plane: controller-manager
    environments.blanketops.dev/api-version: v0.1.4
    environments.blanketops.dev/contract-version: v0.4.0
    environments.blanketops.dev/controller-version: v0.2.5
    environments.blanketops.dev/operator-version: v0.5.1
    environments.blanketops.dev/type: dev
  name: blanketops-environments-controller-manager
  namespace: blanketops-environments
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blanketops-environments
      app.kubernetes.io/part-of: blanketops
      app.kubernetes.io/version: v0.0.1
      control-plane: controller-manager
      environments.blanketops.dev/api-version: v0.1.4
      environments.blanketops.dev/contract-version: v0.1.7
      environments.blanketops.dev/controller-version: v0.2.3
      environments.blanketops.dev/operator-version: v0.2.1
      environments.blanketops.dev/type: dev
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: blanketops-environments
        app.kubernetes.io/part-of: blanketops
        app.kubernetes.io/version: v0.0.1
        control-plane: controller-manager
        environments.blanketops.dev/api-version: v0.1.4
        environments.blanketops.dev/contract-version: v0.1.7
        environments.blanketops.dev/controller-version: v0.2.3
        environments.blanketops.dev/operator-version: v0.2.1
        environments.blanketops.dev/type: dev
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
                - arm64
                - ppc64le
                - s390x
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: ghcr.io/ntlaletsi70/blanketops-environments-controller:v0.3.2
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: blanketops-environments-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: blanketops-environments
    app.kubernetes.io/part-of: blanketops
    app.kubernetes.io/version: v0.0.1
    control-plane: controller-manager
    environments.blanketops.dev/api-version: v0.1.4
    environments.blanketops.dev/contract-version: v0.4.0
    environments.blanketops.dev/controller-version: v0.2.5
    environments.blanketops.dev/operator-version: v0.5.1
    environments.blanketops.dev/type: dev
  name: blanketops-environments-allow-metrics-traffic
  namespace: blanketops-environments
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          metrics: enabled
    ports:
    - port: 8443
      protocol: TCP
  podSelector:
    matchLabels:
      app.kubernetes.io/name: blanketops-environments
      control-plane: controller-manager
  policyTypes:
  - Ingress
