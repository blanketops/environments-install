# This rule is not used by the project blanketops-environments-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the environments.blanketops.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments-operator
    app.kubernetes.io/managed-by: kustomize
  name: build-editor-role
rules:
- apiGroups:
  - environments.blanketops.dev
  resources:
  - builds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - environments.blanketops.dev
  resources:
  - builds/status
  verbs:
  - get
