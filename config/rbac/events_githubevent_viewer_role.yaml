# This rule is not used by the project blanketops-environments-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to events.blanketops.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments-operator
    app.kubernetes.io/managed-by: kustomize
  name: events-githubevent-viewer-role
rules:
- apiGroups:
  - events.blanketops.dev
  resources:
  - githubevents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.blanketops.dev
  resources:
  - githubevents/status
  verbs:
  - get
