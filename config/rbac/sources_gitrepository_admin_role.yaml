# This rule is not used by the project blanketops-environments-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over sources.blanketops.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: v0.0.1
  name: sources-gitrepository-admin-role
rules:
- apiGroups:
  - sources.blanketops.dev
  resources:
  - gitrepositories
  verbs:
  - '*'
- apiGroups:
  - sources.blanketops.dev
  resources:
  - gitrepositories/status
  verbs:
  - get
