# This rule is not used by the project blanketops-environments-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to environments.blanketops.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments
    app.kubernetes.io/part-of: blanketops
    app.kubernetes.io/version: v0.0.1
    environments.blanketops.dev/api-version: v0.0.1
    environments.blanketops.dev/contract-version: v0.0.5
    environments.blanketops.dev/controller-version: v0.0.3
    environments.blanketops.dev/operator-version: v0.0.3
  name: serviceunit-viewer-role
rules:
- apiGroups:
  - environments.blanketops.dev
  resources:
  - serviceunits
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - environments.blanketops.dev
  resources:
  - serviceunits/status
  verbs:
  - get
