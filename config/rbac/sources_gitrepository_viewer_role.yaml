# This rule is not used by the project blanketops-environments-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to sources.blanketops.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments-operator
    app.kubernetes.io/managed-by: kustomize
  name: sources-gitrepository-viewer-role
rules:
- apiGroups:
  - sources.blanketops.dev
  resources:
  - gitrepositories
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sources.blanketops.dev
  resources:
  - gitrepositories/status
  verbs:
  - get
