# ============================================================
# ClusterSecretStore — AWS Secrets Manager
# Replaces: external-secrets.io/v1 fake provider
#
# Prerequisites:
#   - external-secrets operator installed
#   - IRSA or static credentials for AWS access
#   - Secrets created in AWS Secrets Manager under /blanketops/*
#
# AWS secret paths mirror the fake provider keys exactly:
#   /blanketops/git/ssh-privatekey
#   /blanketops/git/ssh-publickey
#   /blanketops/git/known-hosts
#   /blanketops/registry/config
#   /blanketops/github/webhook/secret
#   /blanketops/github/api/token
#   /blanketops/crossplane/github/token
#
# Create secrets in AWS first:
#   aws secretsmanager create-secret \
#     --name /blanketops/git/ssh-privatekey \
#     --secret-string "$(cat ~/.ssh/id_ed25519)"
#   ... repeat per key below
# ============================================================
 
---
# ClusterSecretStore — AWS Secrets Manager
# Cluster-scoped — any namespace can reference this store
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: blanketops-environments-aws
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1          # Cape Town — change if different
      auth:
        # Option A — IRSA (recommended for EKS)
        # Annotate the external-secrets SA with the role ARN
        # kubectl annotate sa external-secrets \
        #   eks.amazonaws.com/role-arn=arn:aws:iam::<ACCOUNT>:role/blanketops-eso-role \
        #   -n external-secrets
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
 
        # Option B — static credentials (non-EKS / bare metal)
        # Uncomment and create the secret manually:
        # kubectl create secret generic aws-credentials \
        #   --from-literal=access-key-id=<KEY_ID> \
        #   --from-literal=secret-access-key=<SECRET> \
        #   -n external-secrets
        #
        # secretRef:
        #   accessKeyIDSecretRef:
        #     name: aws-credentials
        #     namespace: external-secrets
        #     key: access-key-id
        #   secretAccessKeySecretRef:
        #     name: aws-credentials
        #     namespace: external-secrets
        #     key: secret-access-key
 
---
