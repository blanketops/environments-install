# ============================================================
# ClusterSecretStore — GCP Secret Manager
# Mirrors /blanketops/* secret paths from AWS store.
#
# Prerequisites:
#   - external-secrets operator installed
#   - GCP Secret Manager API enabled
#   - Workload Identity or Service Account key configured
#
# Secret naming in GCP Secret Manager:
#   GCP does not support "/" in secret names.
#   Paths are flattened with "_" as separator:
#     /blanketops/git/ssh-privatekey → blanketops_git_ssh-privatekey
#
# Create secrets in GCP first:
#   echo -n "$(cat ~/.ssh/id_ed25519)" | \
#     gcloud secrets create blanketops_git_ssh-privatekey \
#     --data-file=- --project=<PROJECT_ID>
# ============================================================
 
---
# ClusterSecretStore — GCP Secret Manager
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: blanketops-environments-gcp
spec:
  provider:
    gcpsm:
      projectID: "<REPLACE_WITH_GCP_PROJECT_ID>"
      auth:
        # Option A — Workload Identity (recommended for GKE)
        # Annotate the external-secrets SA:
        # kubectl annotate sa external-secrets \
        #   iam.gke.io/gcp-service-account=<SA>@<PROJECT>.iam.gserviceaccount.com \
        #   -n external-secrets
        workloadIdentity:
          clusterLocation: "<REPLACE_WITH_CLUSTER_REGION>"
          clusterName: "<REPLACE_WITH_CLUSTER_NAME>"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
 
        # Option B — Service Account key (non-GKE / bare metal)
        # kubectl create secret generic gcp-sa-key \
        #   --from-file=credentials.json=<SA_KEY_FILE> \
        #   -n external-secrets
        #
        # secretRef:
        #   secretAccessKeySecretRef:
        #     name: gcp-sa-key
        #     namespace: external-secrets
        #     key: credentials.json
 
---
