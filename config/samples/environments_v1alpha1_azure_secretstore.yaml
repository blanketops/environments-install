# ============================================================
# ClusterSecretStore — Azure Key Vault
# Mirrors /blanketops/* secret paths from AWS store.
#
# Prerequisites:
#   - external-secrets operator installed
#   - Azure Key Vault created
#   - Service Principal or Workload Identity configured
#
# Secret naming in Azure Key Vault:
#   Azure Key Vault does not support "/" in secret names.
#   Paths are flattened with "--" as separator:
#     /blanketops/git/ssh-privatekey → blanketops--git--ssh-privatekey
#
# Create secrets in Azure first:
#   az keyvault secret set \
#     --vault-name <VAULT_NAME> \
#     --name "blanketops--git--ssh-privatekey" \
#     --value "$(cat ~/.ssh/id_ed25519)"
# ============================================================
 
---
# ClusterSecretStore — Azure Key Vault
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: blanketops-environments-azure
spec:
  provider:
    azurekv:
      # Azure Key Vault URL
      vaultUrl: "https://<REPLACE_WITH_VAULT_NAME>.vault.azure.net"
      tenantId: "<REPLACE_WITH_TENANT_ID>"
      auth:
        # Option A — Workload Identity (recommended for AKS)
        # Annotate the external-secrets SA:
        # kubectl annotate sa external-secrets \
        #   azure.workload.identity/client-id=<CLIENT_ID> \
        #   -n external-secrets
        workloadIdentity:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
 
        # Option B — Service Principal (non-AKS / bare metal)
        # kubectl create secret generic azure-sp-credentials \
        #   --from-literal=client-id=<CLIENT_ID> \
        #   --from-literal=client-secret=<CLIENT_SECRET> \
        #   -n external-secrets
        #
        # clientId:
        #   secretRef:
        #     name: azure-sp-credentials
        #     namespace: external-secrets
        #     key: client-id
        # clientSecret:
        #   secretRef:
        #     name: azure-sp-credentials
        #     namespace: external-secrets
        #     key: client-secret
