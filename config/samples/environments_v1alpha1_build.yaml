apiVersion: environments.blanketops.dev/v1alpha1
kind: Build
metadata:
  labels:
    app.kubernetes.io/name: blanketops-environments
    app.kubernetes.io/part-of: blanketops
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: v0.0.1
    environments.blanketops.dev/api-version: v0.1.4
    environments.blanketops.dev/contract-version: v0.1.7
    environments.blanketops.dev/controller-version: v0.2.2
    environments.blanketops.dev/operator-version: v0.0.3
  name: build-for-kaniko-sample
  namespace: default
spec:
  contract:
    image: <image-registry>/<repository>/<appliation>:tag
    strategy:
      kind: ClusterBuildStrategy
      name: kaniko
    source:
      url: git@github.com:<repo-owner>/<application>.git
      revision: main
      contextDir: .
      cloneSecret: github-ssh-credentials # from secretStore
    serviceAccount:
      name: build-bot #Autogenerated, can be any other name
      secret: docker-registry-credentials # from secretStore
    policy:
      triggers:
      - type: pull_request
      - type: push
      retry:
        onFailure: true
        maxAttempts: 3
